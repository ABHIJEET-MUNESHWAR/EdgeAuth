# EdgeAuth local stack: the verification node and Prometheus.
#
#   docker compose up            # start the verifier + metrics scraper
#
# EdgeAuth is stateless — there is no database service.
services:
  node:
    build:
      context: .
      dockerfile: Dockerfile
    image: edgeauth-node:local
    command: ["serve"]
    environment:
      EA_BIND_ADDR: 0.0.0.0:8080
      EA_SIGNER_SEED: "7"
      EA_ISSUER: https://issuer.local
      EA_RATE_LIMIT_RPS: "100"
      RUST_LOG: info
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "edgeauth-node", "--help"]
      interval: 30s
      timeout: 5s
      retries: 3

  prometheus:
    image: prom/prometheus:v2.54.1
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - node
